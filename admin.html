<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 CELEBREAD 主揪管理後台</title>
    <style>
        :root {
            --bg-color: #f7f3ed;
            --card-bg: #ffffff;
            --primary: #8c6239;
            --primary-light: #f1ebd9;
            --text-main: #4a3b32;
            --text-muted: #8a7a71;
            --border: #e6dfd5;
            --accent: #d97706;
            --success: #16a34a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; background: var(--card-bg); padding: 25px 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        header h1 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .back-btn { display: inline-block; padding: 6px 14px; background: var(--border); color: var(--text-main); text-decoration: none; border-radius: 6px; font-size: 13px; font-weight: bold; margin-top: 10px; }
        .back-btn:hover { background: #dcd4c7; }
        .panel { background: var(--card-bg); padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        .info-box { background: var(--primary-light); padding: 15px; border-radius: 8px; border-left: 4px solid var(--primary); margin-bottom: 20px; font-size: 14px; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 24px; }
        .stat-card { background: var(--primary-light); padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .stat-card h4 { font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
        .stat-card p { font-size: 20px; font-weight: bold; color: var(--primary); }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        .admin-table th, .admin-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .admin-table th { background: var(--primary-light); color: var(--primary); font-weight: bold; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-done { background: #dcfce7; color: #16a34a; }
        .action-btn { background: var(--primary); color: white; border: none; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .action-btn:hover { background: #734f2d; }
        .btn-danger { display: block; width: 100%; background: #dc2626; color: #fff; border: none; padding: 12px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: center; margin-top: 30px; }
        .btn-danger:hover { background: #b91c1c; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 CELEBREAD 專屬主揪管理後台</h1>
        <p>此頁面僅供主揪統計店家出貨總量及核對帳目使用</p>
        <a href="index.html" class="back-btn">⬅ 回到公開填單頁</a>
    </header>

    <div class="panel">
        <div class="dashboard-grid">
            <div class="stat-card">
                <h4>總訂單數</h4>
                <p id="stat-count">0 筆</p>
            </div>
            <div class="stat-card">
                <h4>總應收金額</h4>
                <p id="stat-money">NT$ 0</p>
            </div>
        </div>

        <h3 style="color: var(--primary); margin-bottom: 10px;">📋 向店家下單「統計總表」</h3>
        <div class="info-box" id="summary-text" style="font-family: monospace; white-space: pre-wrap; background: #fafafa; border-left-color: var(--accent);">
            載入中...
        </div>

        <h3 style="color: var(--primary); margin: 25px 0 10px 0;">👥 訂單明細名冊</h3>
        <div style="overflow-x: auto;">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>姓名/電話</th>
                        <th>品項明細</th>
                        <th>金額</th>
                        <th>付款</th>
                        <th>後五碼/狀態</th>
                        <th>對帳操作</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <!-- 動態注入 -->
                </tbody>
            </table>
        </div>
        
        <button class="btn-danger" onclick="clearAllOrders()">⚠️ 清空所有團購訂單數據（新團開張前使用）</button>
    </div>
</div>

<script>
    // 🔗 貼上你的 Firebase 網址 (記得結尾不要有斜線 / 喔)
    const FIREBASE_URL = "https://celebread-groupbuy-default-rtdb.firebaseio.com";

    const names = {
        country: "鄉村 Country Sourdough",
        farmer: "農夫 Farmer’s Choice",
        walnut: "核桃 Walnut",
        baguette: "酸種法棍 Baguette au Levain",
        olive: "普羅旺斯橄欖 Olive",
        jalapeno: "辣椒起司 Jalapeño & Cheddar",
        chocolate: "巧克力香橙 Chocolate",
        cranberry: "胡桃蔓越莓 Cranberry & Pecan",
        edamame: "毛豆乾酪 Edamame & Grana Padano",
        napoli: "拿坡里 Pane di Napoli"
    };

    function loadAndRender() {
        fetch(`${FIREBASE_URL}/orders.json`)
        .then(res => res.json())
        .then(data => {
            const allOrders = data ? Object.values(data) : [];
            
            document.getElementById('stat-count').innerText = allOrders.length + ' 筆';
            
            let totalMoney = 0;
            let itemCounts = { country: 0, farmer: 0, walnut: 0, baguette: 0, olive: 0, jalapeno: 0, chocolate: 0, cranberry: 0, edamame: 0, napoli: 0 };

            allOrders.forEach(o => {
                totalMoney += o.total;
                if(o.itemsObj) {
                    for(let k in o.itemsObj) {
                        if(itemCounts.hasOwnProperty(k)){ itemCounts[k] += o.itemsObj[k]; }
                    }
                }
            });

            document.getElementById('stat-money').innerText = 'NT$ ' + totalMoney;

            let summaryString = `📦 【CELEBREAD 店家訂貨總數清單】\n`;
            let hasItems = false;
            for(let k in itemCounts) {
                if(itemCounts[k] > 0) {
                    summaryString += `• ${names[k]} ：共 ${itemCounts[k]} 個\n`;
                    hasItems = true;
                }
            }
            if(!hasItems) summaryString += "目前尚無任何人下單。";
            document.getElementById('summary-text').innerText = summaryString;

            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = '';
            
            allOrders.forEach(o => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${o.name}</b><br><span style="font-size:11px; color:#888;">${o.phone}</span></td>
                    <td>${o.items}</td>
                    <td style="color:var(--accent); font-weight:bold;">$${o.total}</td>
                    <td>${o.payment}</td>
                    <td>
                        <span class="status-badge ${o.status === '已確認' ? 'status-done' : 'status-pending'}">
                            ${o.status === '已確認' ? '已入帳' : o.paycode}
                        </span>
                    </td>
                    <td>
                        ${o.status === '未核對' ? `<button class="action-btn" onclick="verifyOrder(${o.id})">確認入帳</button>` : '<span style="color:var(--success); font-weight:bold;">✓ 已確認</span>'}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });
    }

    function verifyOrder(orderId) {
        fetch(`${FIREBASE_URL}/orders/${orderId}/status.json`, {
            method: 'PUT',
            body: JSON.stringify('已確認')
        })
        .then(() => loadAndRender());
    }

    function clearAllOrders() {
        if(confirm('確定要清空雲端上所有訂單數據嗎？此操作無法復原。')) {
            fetch(`${FIREBASE_URL}/orders.json`, { method: 'DELETE' })
            .then(() => loadAndRender());
        }
    }

    window.onload = loadAndRender;
</script>

</body>
</html>
