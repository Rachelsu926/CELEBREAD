<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CELEBREAD 團購管理後台</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #8c6239;
            --primary-light: #f1ebd9;
            --text-main: #333333;
            --border: #cccccc;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #d97706;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 30px; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        header h1 { color: var(--primary); font-size: 26px; }
        
        .stats-dashboard { background: var(--primary-light); border: 1px solid var(--primary); border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .stats-dashboard h2 { font-size: 18px; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .stats-card { background: #fff; padding: 12px; border-radius: 6px; border: 1px solid var(--border); text-align: center; }
        .stats-card .item-name { font-size: 13px; color: #666; font-weight: bold; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .stats-card .item-count { font-size: 20px; font-weight: bold; color: var(--accent); }
        .stats-total-money { grid-column: 1 / -1; background: var(--primary); color: #fff; padding: 12px; border-radius: 6px; font-size: 18px; font-weight: bold; text-align: right; margin-top: 8px; }

        .btn-group { display: flex; gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid #eeeeee; font-size: 14px; }
        th { background-color: #eaeaea; color: #444; font-weight: bold; }
        
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .status-uncheck { background: #fee2e2; color: #ef4444; border: 1px solid #fca5a5; }
        .status-checked { background: #dcfce7; color: #22c55e; border: 1px solid #86efac; }
        .empty-msg { text-align: center; padding: 20px 0; color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 CELEBREAD 團購訂單管理後台</h1>
        <div class="btn-group">
            <button class="btn btn-success" onclick="exportToExcelPro()">🍏 匯出完美排版 Excel 報表</button>
        </div>
    </header>

    <div class="stats-dashboard">
        <h2>🥖 當前開團品項總量統計表 (店家下單專用)</h2>
        <div class="stats-grid" id="stats-grid-container"></div>
    </div>

    <table id="orders-table">
        <thead>
            <tr>
                <th>訂單時間</th>
                <th>跟團姓名</th>
                <th>聯絡電話#分機</th>
                <th>訂購明細總覽</th>
                <th>付款方式</th>
                <th>後五碼 / 備註</th>
                <th>應付金額</th>
                <th>對帳狀態 (點擊切換)</th>
            </tr>
        </thead>
        <tbody id="orders-tbody">
            <tr><td colspan="8" class="empty-msg">🔄 正在連線雲端資料庫載入訂單...</td></tr>
        </tbody>
    </table>

    <div style="text-align: right; margin-top: 40px;">
        <button class="btn btn-danger" onclick="clearAllData()">🚨 清空所有團購訂單數據（新開團前專用）</button>
    </div>
</div>

<script>
    const FIREBASE_URL = "https://celebread-groupbuy-default-rtdb.firebaseio.com";
    
    const itemNamesMap = {
        country: "鄉村 Country Sourdough",
        farmer: "農夫 Farmer’s Choice",
        walnut: "核桃 Walnut",
        baguette: "酸種法棍 Baguette",
        olive: "普羅旺斯橄欖 Olive",
        jalapeno: "辣椒起司 Jalapeño",
        chocolate: "巧克力香橙 Chocolate",
        cranberry: "胡桃蔓越莓 Cranberry",
        edamame: "毛豆乾酪 Edamame",
        napoli: "拿坡里 Pane di Napoli"
    };

    let rawOrdersList = [];

    window.onload = function() { loadOrdersFromFirebase(); };

    function loadOrdersFromFirebase() {
        fetch(`${FIREBASE_URL}/orders.json`)
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById('orders-tbody');
            tbody.innerHTML = '';
            rawOrdersList = [];

            if (!data) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty-msg">📭 目前尚無任何團員填單。</td></tr>';
                renderDashboardSummary({});
                return;
            }

            let aggregateCounts = { country: 0, farmer: 0, walnut: 0, baguette: 0, olive: 0, jalapeno: 0, chocolate: 0, cranberry: 0, edamame: 0, napoli: 0 };
            let totalRevenue = 0;

            for (let id in data) {
                const order = data[id];
                rawOrdersList.push(order);
                totalRevenue += (order.total || 0);

                if (order.itemsObj) {
                    for (let key in order.itemsObj) {
                        if (aggregateCounts.hasOwnProperty(key)) {
                            aggregateCounts[key] += parseInt(order.itemsObj[key] || 0);
                        }
                    }
                }

                const dateStr = new Date(order.id).toLocaleString('zh-TW', { hour12: false });
                const badgeClass = order.status === '已確認' ? 'status-checked' : 'status-uncheck';
                const currentStatus = order.status || '未核對';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${dateStr}</td>
                    <td><b>${order.name}</b></td>
                    <td>${order.phone}</td>
                    <td style="color:#555; font-size:13px;">${order.items}</td>
                    <td>${order.payment}</td>
                    <td><span style="font-family:monospace; background:#f0f0f0; padding:2px 6px; border-radius:4px;">${order.paycode}</span></td>
                    <td style="font-weight:bold; color:var(--accent);">NT$ ${order.total}</td>
                    <td><span class="status-badge ${badgeClass}" onclick="toggleStatus('${order.id}', '${currentStatus}')">${currentStatus}</span></td>
                `;
                tbody.appendChild(tr);
            }
            renderDashboardSummary(aggregateCounts, totalRevenue);
        })
        .catch(err => {
            document.getElementById('orders-tbody').innerHTML = '<tr><td colspan="8" class="empty-msg" style="color:var(--danger);">❌ 連線失敗！</td></tr>';
        });
    }

    function renderDashboardSummary(counts, totalMoney = 0) {
        const container = document.getElementById('stats-grid-container');
        container.innerHTML = '';
        let hasAnyItems = false;
        for (let key in itemNamesMap) {
            const count = counts[key] || 0;
            if (count > 0) {
                hasAnyItems = true;
                const card = document.createElement('div');
                card.className = 'stats-card';
                card.innerHTML = `<div class="item-name">${itemNamesMap[key]}</div><div class="item-count">${count} 顆</div>`;
                container.appendChild(card);
            }
        }
        if (!hasAnyItems) {
            container.innerHTML = '<div style="color:#666; font-style:italic; padding:10px;">目前暫無品項銷售數據。</div>';
            return;
        }
        const totalBar = document.createElement('div');
        totalBar.className = 'stats-total-money';
        totalBar.innerText = `💰 目前開團累積總金額： NT$ ${totalMoney.toLocaleString()} 元`;
        container.appendChild(totalBar);
    }

    function toggleStatus(orderId, currentStatus) {
        const nextStatus = currentStatus === '已確認' ? '未核對' : '已確認';
        fetch(`${FIREBASE_URL}/orders/${orderId}/status.json`, { method: 'PUT', body: JSON.stringify(nextStatus) })
        .then(() => loadOrdersFromFirebase());
    }

    // 🍏 進階專業版 Excel 匯出邏輯（多工作表 + 獨立數量欄位 + 自動計算）
    function exportToExcelPro() {
        if (rawOrdersList.length === 0) { alert('目前沒有任何訂單數據可以匯出！'); return; }

        // --- 工作表 1: 店家下單總量統計 ---
        const sheet1Data = [
            ["🥖 CELEBREAD 歐包團購 - 店家備貨總量下單表"],
            [],
            ["麵包品項名稱", "開團預訂總數量 (顆)"]
        ];
        
        let totalQtySum = 0;
        let totalRevenueSum = 0;
        let itemTotals = { country: 0, farmer: 0, walnut: 0, baguette: 0, olive: 0, jalapeno: 0, chocolate: 0, cranberry: 0, edamame: 0, napoli: 0 };

        rawOrdersList.forEach(order => {
            totalRevenueSum += (order.total || 0);
            if (order.itemsObj) {
                for (let key in itemTotals) {
                    itemTotals[key] += parseInt(order.itemsObj[key] || 0);
                }
            }
        });

        for (let key in itemNamesMap) {
            let count = itemTotals[key];
            if (count > 0) {
                sheet1Data.push([itemNamesMap[key], count]);
                totalQtySum += count;
            }
        }
        sheet1Data.push([]);
        sheet1Data.push(["📦 總計全團麵包個數", totalQtySum + " 顆"]);
        sheet1Data.push(["💰 全團預估銷售總金額", "NT$ " + totalRevenueSum.toLocaleString() + " 元"]);


        // --- 工作表 2: 團員訂單明細總表 (展開獨立欄位) ---
        const sheet2Header = [
            "填單時間", "團員姓名", "聯絡電話/分機", "付款方式", "帳號後五碼", 
            "鄉村", "農夫", "核桃", "法棍", "普羅旺斯橄欖", "辣椒起司", "巧克力香橙", "胡桃蔓越莓", "毛豆乾酪", "拿坡里",
            "應付總金額", "對帳狀態"
        ];
        const sheet2Data = [sheet2Header];

        rawOrdersList.forEach(order => {
            const io = order.itemsObj || {};
            const row = [
                new Date(order.id).toLocaleString('zh-TW', { hour12: false }),
                order.name,
                order.phone,
                order.payment,
                order.paycode,
                // 精確填入每款麵包數量，沒買就填 0 或是留白（這裡填數量，方便後續在 Excel 裡拉加總）
                io.country || 0, io.farmer || 0, io.walnut || 0, io.baguette || 0, io.olive || 0,
                io.jalapeno || 0, io.chocolate || 0, io.cranberry || 0, io.edamame || 0, io.napoli || 0,
                order.total,
                order.status || '未核對'
            ];
            sheet2Data.push(row);
        });

        // 建立活頁簿
        const wb = XLSX.utils.book_new();

        // 寫入工作表 1
        const ws1 = XLSX.utils.aoa_to_sheet(sheet1Data);
        XLSX.utils.book_append_sheet(wb, ws1, "1.店家下單總量統計");

        // 寫入工作表 2
        const ws2 = XLSX.utils.aoa_to_sheet(sheet2Data);
        XLSX.utils.book_append_sheet(wb, ws2, "2.團員訂單明細總表");

        // 執行下載
        XLSX.writeFile(wb, `CELEBREAD_完美團購整合報表_${Date.now()}.xlsx`);
    }

    function clearAllData() {
        if (confirm('🚨 警告：此操作將會刪除雲端資料庫內【所有的團員訂單】！\n\n您確定已經將本團的 Excel 報表匯出存檔了嗎？')) {
            fetch(`${FIREBASE_URL}/orders.json`, { method: 'DELETE' })
            .then(() => { alert('🗑️ 雲端訂單數據已成功歸零清空！'); loadOrdersFromFirebase(); });
        }
    }
</script>

</body>
</html>
